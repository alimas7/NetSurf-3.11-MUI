name: Debug Curl & OpenSSL Linkage
on: [push, workflow_dispatch]

jobs:
  debug-build:
    runs-on: ubuntu-22.04
    env:
      PREFIX: /home/runner/ns-workspace/inst
      TOOLCHAIN_PREFIX: arm-kindle-linux-gnueabi
    steps:
      - name: Install System Deps
        run: |
          sudo apt-get update
          sudo apt-get install -y gperf bison flex texinfo help2man make libncurses5-dev \
          python3-dev autoconf automake libtool-bin g++ gawk xz-utils wget curl tree pkg-config

      - name: Restore Toolchain Cache
        id: cache-toolchain
        uses: actions/cache/restore@v4
        with:
          path: ~/x-tools
          key: ${{ runner.os }}-kindle-k3-toolchain-v9

      - name: Build Toolchain Fallback
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          CT_REPO=$(echo "aHR0cHM6Ly9naXRodWIuY29tL2Nyb3NzdG9vbC1uZy9jcm9zc3Rvb2wtbmcuZ2l0" | base64 -d)
          git clone --depth 1 "$CT_REPO"
          cd crosstool-ng
          ./bootstrap && ./configure --enable-local && make
          cat > kindle_k3_defconfig <<EOF
          CT_EXPERIMENTAL=y
          CT_ALLOW_OBSOLETE=y
          CT_ARCH_ARM=y
          CT_ARCH_ARCH="armv6"
          CT_ARCH_CPU="arm1136jf-s"
          CT_ARCH_FLOAT_SW=y
          CT_TARGET_VENDOR="kindle"
          CT_LIBC_GLIBC=y
          CT_LIBC_GLIBC_V_2_5=y
          CT_KERNEL_LINUX=y
          CT_KERNEL_V_2_6_26=y
          CT_GCC_V_6=y
          CT_LOG_PROGRESS_BAR=n
          EOF
          ./ct-ng defconfig DEFCONFIG=kindle_k3_defconfig
          ./ct-ng build

      - name: Save Toolchain Cache
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ~/x-tools
          key: ${{ runner.os }}-kindle-k3-toolchain-v9

      - name: Locate Toolchain
        run: |
          REAL_BIN=$(find /home/runner/x-tools -name "arm-kindle-linux-gnueabi-gcc" -type f -executable -printf '%h\n' | head -n 1)
          echo "TOOLCHAIN_BIN=$REAL_BIN" >> $GITHUB_ENV
          echo "$REAL_BIN" >> $GITHUB_PATH
          SYS_LIB=$(find /home/runner/x-tools -name "libatomic.a" -printf '%h\n' | head -n 1)
          echo "SYSROOT_LIB=$SYS_LIB" >> $GITHUB_ENV

      - name: Clone Repos
        run: |
          mkdir -p ~/ns-workspace
          cd ~/ns-workspace
          URL_OPENSSL=$(echo "aHR0cHM6Ly9naXRodWIuY29tL29wZW5zc2wvb3BlbnNzbC5naXQ=" | base64 -d)
          URL_CURL=$(echo "aHR0cHM6Ly9naXRodWIuY29tL2N1cmwvY3VybC5naXQ=" | base64 -d)
          git clone --depth 1 --branch openssl-3.0 "$URL_OPENSSL" openssl
          git clone --depth 1 "$URL_CURL" curl

      - name: Build OpenSSL
        run: |
          cd ~/ns-workspace/openssl
          ./Configure linux-armv4 --prefix=$PREFIX --openssldir=$PREFIX/ssl no-shared \
            CC=$TOOLCHAIN_BIN/$TOOLCHAIN_PREFIX-gcc \
            AR=$TOOLCHAIN_BIN/$TOOLCHAIN_PREFIX-ar \
            RANLIB=$TOOLCHAIN_BIN/$TOOLCHAIN_PREFIX-ranlib \
            LD=$TOOLCHAIN_BIN/$TOOLCHAIN_PREFIX-ld
          make -j$(nproc) install_sw

      - name: Build LibCurl (Fixed)
        run: |
          cd ~/ns-workspace/curl
          autoreconf -fi
          export PKG_CONFIG_PATH=$PREFIX/lib/pkgconfig
          ./configure --host=$TOOLCHAIN_PREFIX --prefix=$PREFIX \
            --with-openssl=$PREFIX --disable-shared --enable-static \
            --disable-threaded-resolver --without-libidn2 \
            CC=$TOOLCHAIN_BIN/$TOOLCHAIN_PREFIX-gcc \
            AR=$TOOLCHAIN_BIN/$TOOLCHAIN_PREFIX-ar \
            RANLIB=$TOOLCHAIN_BIN/$TOOLCHAIN_PREFIX-ranlib \
            LDFLAGS="-L$SYSROOT_LIB" \
            LIBS="-latomic"
          make -j$(nproc) && make install

      - name: Verify Architecture
        run: |
          $TOOLCHAIN_BIN/$TOOLCHAIN_PREFIX-readelf -h $PREFIX/bin/curl | grep -E 'Class|Data|Machine'
          $TOOLCHAIN_BIN/$TOOLCHAIN_PREFIX-strip $PREFIX/bin/curl

      - name: Upload Finished Binaries
        uses: actions/upload-artifact@v4
        with:
          name: kindle-curl-stripped
          path: ${{ env.PREFIX }}/bin/curl
