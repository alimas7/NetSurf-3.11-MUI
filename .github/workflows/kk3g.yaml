name: Build NetSurf for Kindle K3
on: workflow_dispatch

jobs:
  build-kindle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bison flex libcurl4-openssl-dev \
            libpng-dev libjpeg-dev libssl-dev pkg-config gperf rsync wget \
            help2man gawk texinfo libncurses-dev libtool libtool-bin \
            autoconf automake gettext ncurses-dev

      - name: Download Pre-built Kindle Toolchain
        run: |
          echo "aHR0cHM6Ly9naXRodWIuY29tL2tvcmVhZGVyL2tveHRvb2xjaGFpbi9yZWxlYXNlcy9kb3dubG9hZC8yMDI1LjA1L2tpbmRsZS50YXIuZ3o=" | base64 -d | xargs wget -O kindle.tar.gz
          tar -xf kindle.tar.gz -C $HOME
          echo "KINDLE_TC_PATH=$HOME/x-tools/arm-kindle-linux-gnueabi" >> $GITHUB_ENV
          echo "$HOME/x-tools/arm-kindle-linux-gnueabi/bin" >> $GITHUB_PATH

      - name: Build NetSurf Stack
        run: |
          set -e
          export HOST=arm-kindle-linux-gnueabi
          export CC=${HOST}-gcc
          export PREFIX=$GITHUB_WORKSPACE/kindle-root
          export PKG_CONFIG_PATH=$PREFIX/lib/pkgconfig
          export NSSHARE=$PREFIX/share/netsurf-buildsystem
          export PATH=$PREFIX/bin:$PATH

          KINDLE_CFLAGS="-DXML_GE=1 -I$PREFIX/include"
          KINDLE_LDFLAGS="-L$PREFIX/lib"
          mkdir -p $PREFIX/include $PREFIX/lib/pkgconfig $PREFIX/share

          # 1. Expat
          echo "aHR0cHM6Ly9naXRodWIuY29tL2xpYmV4cGF0L2xpYmV4cGF0L3JlbGVhc2VzL2Rvd25sb2FkL1JfMl82XzAvZXhwYXQtMi42LjAudGFyLmd6" | base64 -d | xargs wget -O expat.tar.gz
          tar -xf expat.tar.gz
          cd expat-2.6.0
          ./configure --host=$HOST --prefix=$PREFIX --disable-shared
          make -j$(nproc) install
          cd ..

          # 2. NetSurf buildsystem
          echo "Z2l0Oi8vZ2l0Lm5ldHN1cmYtYnJvd3Nlci5vcmcvYnVpbGRzeXN0ZW0uZ2l0" | base64 -d | xargs git clone
          cd buildsystem
          make install PREFIX=$PREFIX
          cd ..

          # 3. nsgenbind (host tool)
          echo "Z2l0Oi8vZ2l0Lm5ldHN1cmYtYnJvd3Nlci5vcmcvbnNnZW5iaW5kLmdpdA==" | base64 -d | xargs git clone
          cd nsgenbind
          make PREFIX=$PREFIX NSSHARE=$NSSHARE HOST=x86_64-linux-gnu CC=gcc install
          cd ..

          # 4. Zlib
          echo "aHR0cHM6Ly9naXRodWIuY29tL21hZGxlci96bGliL3JlbGVhc2VzL2Rvd25sb2FkL3YxLjMuMS96bGliLTEuMy4xLnRhci5neg==" | base64 -d | xargs wget -O zlib.tar.gz
          tar -xf zlib.tar.gz
          cd zlib-1.3.1
          CHOST=$HOST ./configure --prefix=$PREFIX --static
          make -j$(nproc) install
          cd ..

          # 5. LibPNG
          echo "aHR0cHM6Ly9kb3dubG9hZC5zb3VyY2Vmb3JnZS5uZXQvcHJvamVjdC9saWJwbmcvbGlicG5nMTYvMS42LjQ0L2xpYnBuZy0xLjYuNDQudGFyLmd6" | base64 -d | xargs wget -O libpng.tar.gz
          tar -xf libpng.tar.gz
          cd libpng-1.6.44
          ./configure --host=$HOST --prefix=$PREFIX --disable-shared LDFLAGS="$KINDLE_LDFLAGS" CPPFLAGS="$KINDLE_CFLAGS"
          make -j$(nproc) install
          cd ..

          # 6. LibJPEG
          echo "aHR0cHM6Ly93d3cuaWpnLm9yZy9maWxlcy9qcGVnc3JjLnY5ZS50YXIuZ3o=" | base64 -d | xargs wget -O jpeg.tar.gz
          tar -xf jpeg.tar.gz
          cd jpeg-9e
          ./configure --host=$HOST --prefix=$PREFIX --disable-shared
          make -j$(nproc) install
          cd ..

          # 7. Freetype
          echo "aHR0cHM6Ly9kb3dubG9hZC5zYXZhbm5haC5nbnUub3JnL3JlbGVhc2VzL2ZyZWV0eXBlL2ZyZWV0eXBlLTIuMTMuMy50YXIuZ3o=" | base64 -d | xargs wget -O freetype.tar.gz
          tar -xf freetype.tar.gz
          cd freetype-2.13.3
          ./configure --host=$HOST --prefix=$PREFIX --disable-shared --with-png=yes --with-zlib=yes
          make -j$(nproc) install
          cd ..

          # 8a. libparserutils (Fixed Header and Include Path Issue)
          echo "Z2l0Oi8vZ2l0Lm5ldHN1cmYtYnJvd3Nlci5vcmcvbGlicGFyc2VydXRpbHMuZ2l0" | base64 -d | xargs git clone
          cd libparserutils
          
          # 1. Build once to generate aliases.h and other headers
          make HOST=$HOST PREFIX=$PREFIX NSSHARE=$NSSHARE CC=$CC BUILD_CC=gcc CFLAGS="$KINDLE_CFLAGS" || true
          
          # 2. Fix: Create the folder structure the source code expects for local includes
          mkdir -p charset
          cp src/charset/aliases.h charset/aliases.h
          
          # 3. Fix: Create the 'parserutils' symlink so <parserutils/charset/mibenum.h> works
          mkdir -p include/parserutils
          ln -s ../../include/parserutils include/parserutils/ 2>/dev/null || true # handle existing
          cp -r include/parserutils .
          
          # 4. Final build and install with explicit include paths
          make HOST=$HOST PREFIX=$PREFIX NSSHARE=$NSSHARE \
            CC=$CC BUILD_CC=gcc \
            CFLAGS="$KINDLE_CFLAGS -D_GNU_SOURCE -I. -Iinclude -Isrc" \
            LDFLAGS="$KINDLE_LDFLAGS" \
            -j$(nproc) install
          cd ..

          # 8b. Remaining NetSurf libraries (The Universal Include Fix)
          LIBS_B64="Z2l0Oi8vZ2l0Lm5ldHN1cmYtYnJvd3Nlci5vcmcvbGlibnN1dGlscy5naXQ= Z2l0Oi8vZ2l0Lm5ldHN1cmYtYnJvd3Nlci5vcmcvbGlidXRmOHByb2MuZ2l0 Z2l0Oi8vZ2l0Lm5ldHN1cmYtYnJvd3Nlci5vcmcvbGlid2FwY2FwbGV0LmdpdA== Z2l0Oi8vZ2l0Lm5ldHN1cmYtYnJvd3Nlci5vcmcvbGliaHViYnViLmdpdA== Z2l0Oi8vZ2l0Lm5ldHN1cmYtYnJvd3Nlci5vcmcvbGliY3NzLmdpdA== Z2l0Oi8vZ2l0Lm5ldHN1cmYtYnJvd3Nlci5vcmcvbGliZG9tLmdpdA== Z2l0Oi8vZ2l0Lm5ldHN1cmYtYnJvd3Nlci5vcmcvbGlibnNibXAuZ2l0 Z2l0Oi8vZ2l0Lm5ldHN1cmYtYnJvd3Nlci5vcmcvbGlibnNnaWYuZ2l0 Z2l0Oi8vZ2l0Lm5ldHN1cmYtYnJvd3Nlci5vcmcvbGlibnNmYi5naXQ="
          for url_b64 in $LIBS_B64; do
            URL=$(echo $url_b64 | base64 -d)
            DIR=$(basename $URL .git)
            echo "--- Building $DIR ---"
            git clone $URL
            cd $DIR
            
            # Setup recursive include paths for the compiler
            # This allows #include "utils/utils.h" to find src/utils/utils.h
            export CPATH="$PWD:$PWD/src:$PWD/include:$PREFIX/include"
            
            # Special case for libutf8proc which puts its header in the root
            if [ "$DIR" = "libutf8proc" ]; then
              [ -f utf8proc.h ] && cp utf8proc.h include/ 2>/dev/null || true
            fi

            # Build and Install
            make HOST=$HOST PREFIX=$PREFIX NSSHARE=$NSSHARE \
              CC=$CC BUILD_CC=gcc \
              CFLAGS="$KINDLE_CFLAGS -D_GNU_SOURCE" \
              LDFLAGS="$KINDLE_LDFLAGS" \
              -j$(nproc) install
            
            # Clean CPATH for the next library in the loop
            unset CPATH
            cd ..
          done

          # 9. NetSurf framebuffer
          echo "Z2l0Oi8vZ2l0Lm5ldHN1cmYtYnJvd3Nlci5vcmcvbmV0c3VyZi5naXQ=" | base64 -d | xargs git clone
          cd netsurf
          cat <<EOF > Makefile.config
          override NETSURF_USE_RSVG := NO
          override NETSURF_USE_NSSVG := NO
          override NETSURF_USE_VIDEO := NO
          override NETSURF_FB_FONTLIB := freetype
          override NETSURF_USE_FREETYPE := YES
          EOF
          make TARGET=framebuffer HOST=$HOST PREFIX=$PREFIX NSSHARE=$NSSHARE \
            BUILD_CC=gcc CFLAGS="$KINDLE_CFLAGS" LDFLAGS="$KINDLE_LDFLAGS" \
            -j$(nproc) install
          ${HOST}-strip $PREFIX/bin/netsurf
          echo -e '#!/bin/sh\nexport LD_LIBRARY_PATH=$PWD/lib:$LD_LIBRARY_PATH\n./bin/netsurf -b 8 -f /dev/fb0 "https://www.google.com"' > $PREFIX/bin/netsurf.sh
          chmod +x $PREFIX/bin/netsurf.sh

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: netsurf-kindle-k3
          path: ${{ github.workspace }}/kindle-root/
