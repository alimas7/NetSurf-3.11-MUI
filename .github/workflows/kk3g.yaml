name: Build NetSurf for Kindle K3
on: workflow_dispatch

jobs:
  build-kindle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bison flex libcurl4-openssl-dev \
            libpng-dev libjpeg-dev libssl-dev pkg-config gperf rsync wget \
            help2man gawk texinfo libncurses-dev libtool libtool-bin \
            autoconf automake gettext ncurses-dev

      - name: Download Pre-built Kindle Toolchain
        run: |
          echo "aHR0cHM6Ly9naXRodWIuY29tL2tvcmVhZGVyL2tveHRvb2xjaGFpbi9yZWxlYXNlcy9kb3dubG9hZC8yMDI1LjA1L2tpbmRsZS50YXIuZ3o=" | base64 -d | xargs wget -O kindle.tar.gz
          tar -xf kindle.tar.gz -C $HOME
          echo "KINDLE_TC_PATH=$HOME/x-tools/arm-kindle-linux-gnueabi" >> $GITHUB_ENV
          echo "$HOME/x-tools/arm-kindle-linux-gnueabi/bin" >> $GITHUB_PATH

      - name: Build NetSurf Stack
        run: |
          export HOST=arm-kindle-linux-gnueabi
          export CC=${HOST}-gcc
          export PREFIX=$GITHUB_WORKSPACE/kindle-root
          export PKG_CONFIG_PATH=$PREFIX/lib/pkgconfig
          export NSSHARE=$PREFIX/share/netsurf-buildsystem
          
          # We define these but DO NOT export them globally yet 
          # to avoid the "stubs-32.h" host error.
          KINDLE_CFLAGS="-DXML_GE=1 -I$PREFIX/include"
          KINDLE_LDFLAGS="-L$PREFIX/lib"
          
          mkdir -p $PREFIX/include $PREFIX/lib/pkgconfig

          # 1. Expat, 2. Buildsystem (Same as before)
          # ... (Keep your existing code for these two) ...

          # 3. nsgenbind (BUILD FOR HOST - MUST BE CLEAN)
          echo "Z2l0Oi8vZ2l0Lm5ldHN1cmYtYnJvd3Nlci5vcmcvbnNnZW5iaW5kLmdpdA==" | base64 -d | xargs git clone
          cd nsgenbind
          # Notice: No KINDLE_CFLAGS here!
          make PREFIX=$PREFIX NSSHARE=$NSSHARE HOST=x86_64-linux-gnu CC=gcc install
          cd ..
          export PATH=$PREFIX/bin:$PATH

          # 4. LibPNG & 5. Freetype (BUILD FOR KINDLE)
          # ... (Use your existing code, but add CFLAGS="$KINDLE_CFLAGS" to ./configure) ...

          # 6. Mandatory NetSurf Libraries
          # (Loop through your LIBS_B64 as before, but use the line below):
          # make HOST=$HOST PREFIX=$PREFIX NSSHARE=$NSSHARE CFLAGS="$KINDLE_CFLAGS" LDFLAGS="$KINDLE_LDFLAGS" install

          # 7. NetSurf Browser (THE CRITICAL FIX)
          echo "Z2l0Oi8vZ2l0Lm5ldHN1cmYtYnJvd3Nlci5vcmcvbmV0c3VyZi5naXQ=" | base64 -d | xargs git clone
          cd netsurf
          cat <<EOF > Makefile.config
          override NETSURF_USE_RSVG := NO
          override NETSURF_USE_NSSVG := NO
          override NETSURF_FB_FONTLIB := freetype
          override NETSURF_USE_FREETYPE := YES
          EOF

          # We pass Kindle flags to CFLAGS/LDFLAGS, but keep BUILD_CC clean
          make TARGET=framebuffer HOST=$HOST PREFIX=$PREFIX NSSHARE=$NSSHARE \
               BUILD_CC=gcc \
               CFLAGS="$KINDLE_CFLAGS" \
               LDFLAGS="$KINDLE_LDFLAGS" install

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: netsurf-kindle-k3
          path: ${{ github.workspace }}/kindle-root/
