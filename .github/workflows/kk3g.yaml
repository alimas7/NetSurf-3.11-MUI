name: Build NetSurf for Kindle K3
on: workflow_dispatch

jobs:
  build-kindle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bison flex libcurl4-openssl-dev \
            libpng-dev libjpeg-dev libssl-dev pkg-config gperf rsync wget \
            help2man gawk texinfo libncurses-dev libtool libtool-bin \
            autoconf automake gettext ncurses-dev

      - name: Download Pre-built Kindle Toolchain
        run: |
          wget https://github.com/koreader/koxtoolchain/releases/download/2025.05/kindle.tar.gz
          tar -xf kindle.tar.gz -C $HOME
          echo "KINDLE_TC_PATH=$HOME/x-tools/arm-kindle-linux-gnueabi" >> $GITHUB_ENV
          echo "$HOME/x-tools/arm-kindle-linux-gnueabi/bin" >> $GITHUB_PATH

      - name: Build NetSurf Stack
        run: |
          export HOST=arm-kindle-linux-gnueabi
          export CC=${HOST}-gcc
          export PREFIX=$GITHUB_WORKSPACE/kindle-root
          export PKG_CONFIG_PATH=$PREFIX/lib/pkgconfig
          export LD_LIBRARY_PATH=$PREFIX/lib:$LD_LIBRARY_PATH
          mkdir -p $PREFIX

          # 1. Build the NetSurf Build System (Must be first)
          git clone git://git.netsurf-browser.org/buildsystem.git
          cd buildsystem && make install PREFIX=$PREFIX && cd ..

          # 2. Build Mandatory Libraries in strict order
          LIBS="libparserutils libwapcaplet libhubbub libcss libdom libnsbmp libnsgif libnsfb"
          for lib in $LIBS; do
            git clone git://git.netsurf-browser.org/$lib.git
            cd $lib
            make HOST=$HOST PREFIX=$PREFIX install
            cd ..
          done

          # 3. Finally, build NetSurf Browser
          # Note: If your 'Checkout Code' step is a NetSurf fork, it should be in the current dir
          make TARGET=framebuffer HOST=$HOST PREFIX=$PREFIX install
