name: Build NetSurf for Kindle K3
on: workflow_dispatch

jobs:
  build-kindle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bison flex libcurl4-openssl-dev \
            libpng-dev libjpeg-dev libssl-dev pkg-config gperf rsync wget \
            help2man gawk texinfo libncurses-dev libtool libtool-bin \
            autoconf automake gettext ncurses-dev

      - name: Download Pre-built Kindle Toolchain
        run: |
          wget https://github.com/koreader/koxtoolchain/releases/download/2025.05/kindle.tar.gz
          tar -xf kindle.tar.gz -C $HOME
          echo "KINDLE_TC_PATH=$HOME/x-tools/arm-kindle-linux-gnueabi" >> $GITHUB_ENV
          echo "$HOME/x-tools/arm-kindle-linux-gnueabi/bin" >> $GITHUB_PATH

      - name: Build NetSurf Stack
        run: |
          export HOST=arm-kindle-linux-gnueabi
          export CC=${HOST}-gcc
          export PREFIX=$GITHUB_WORKSPACE/kindle-root
          export PKG_CONFIG_PATH=$PREFIX/lib/pkgconfig
          export CFLAGS="-I$PREFIX/include -Wno-error=undef"
          export LDFLAGS="-L$PREFIX/lib"
          mkdir -p $PREFIX

          # 1. Cross-compile Expat (Encoded to bypass truncation)
          echo "d2dldCBodHRwczovL2dpdGh1Yi5jb20vbGliZXhwYXQvbGliZXhwYXQvcmVsZWFzZXMvZG93bmxvYWQvUl8yXzZfMC9leHBhdC0yLjYuMC50YXIuZ3o=" | base64 -d | sh
          tar -xf expat-2.6.0.tar.gz
          cd expat-2.6.0
          ./configure --host=$HOST --prefix=$PREFIX --disable-shared
          make install
          cd ..

          # 2. Build NetSurf Buildsystem
          git clone git://git.netsurf-browser.org/buildsystem.git
          cd buildsystem && make install PREFIX=$PREFIX && cd ..
          
          # Set the share path for the buildsystem
          export NSSHARE=$PREFIX/share/netsurf-buildsystem

          # 3. Build Mandatory Libraries in strict order
          LIBS="libparserutils libwapcaplet libhubbub libcss libdom libnsbmp libnsgif libnsfb"
          for lib in $LIBS; do
            echo "--- Building $lib ---"
            git clone git://git.netsurf-browser.org/$lib.git
            cd $lib
            # Running build then install with NSSHARE and CFLAGS
            make HOST=$HOST PREFIX=$PREFIX NSSHARE=$NSSHARE CFLAGS="$CFLAGS"
            make HOST=$HOST PREFIX=$PREFIX NSSHARE=$NSSHARE CFLAGS="$CFLAGS" install
            cd ..
          done

          # 4. Build NetSurf Browser
          make TARGET=framebuffer HOST=$HOST PREFIX=$PREFIX NSSHARE=$NSSHARE CFLAGS="$CFLAGS" install

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: netsurf-kindle-k3
          path: ${{ github.workspace }}/kindle-root/
