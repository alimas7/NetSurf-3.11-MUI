name: Build NetSurf for Kindle K3
on: workflow_dispatch

jobs:
  build-kindle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bison flex libcurl4-openssl-dev \
            libpng-dev libjpeg-dev libssl-dev pkg-config gperf rsync wget \
            help2man gawk texinfo libncurses-dev libtool libtool-bin \
            autoconf automake gettext ncurses-dev

      - name: Download Pre-built Kindle Toolchain
        run: |
          echo "aHR0cHM6Ly9naXRodWIuY29tL2tvcmVhZGVyL2tveHRvb2xjaGFpbi9yZWxlYXNlcy9kb3dubG9hZC8yMDI1LjA1L2tpbmRsZS50YXIuZ3o=" | base64 -d | xargs wget -O kindle.tar.gz
          tar -xf kindle.tar.gz -C $HOME
          echo "KINDLE_TC_PATH=$HOME/x-tools/arm-kindle-linux-gnueabi" >> $GITHUB_ENV
          echo "$HOME/x-tools/arm-kindle-linux-gnueabi/bin" >> $GITHUB_PATH

      - name: Build NetSurf Stack
        run: |
          export HOST=arm-kindle-linux-gnueabi
          export CC=${HOST}-gcc
          export PREFIX=$GITHUB_WORKSPACE/kindle-root
          export PKG_CONFIG_PATH=$PREFIX/lib/pkgconfig
          export NSSHARE=$PREFIX/share/netsurf-buildsystem
          export LDFLAGS="-L$PREFIX/lib"
          export CFLAGS="-DXML_GE=1 -I$PREFIX/include"
          
          mkdir -p $PREFIX/include $PREFIX/lib/pkgconfig

          # 1. Expat
          echo "aHR0cHM6Ly9naXRodWIuY29tL2xpYmV4cGF0L2xpYmV4cGF0L3JlbGVhc2VzL2Rvd25sb2FkL1JfMl82XzAvZXhwYXQtMi42LjAudGFyLmd6" | base64 -d | xargs wget -O expat.tar.gz
          tar -xf expat.tar.gz && cd expat-2.6.0
          ./configure --host=$HOST --prefix=$PREFIX --disable-shared
          make install && cd ..

          # 2. Buildsystem & nsgenbind (Host Build)
          echo "Z2l0Oi8vZ2l0Lm5ldHN1cmYtYnJvd3Nlci5vcmcvYnVpbGRzeXN0ZW0uZ2l0" | base64 -d | xargs git clone
          cd buildsystem && make install PREFIX=$PREFIX && cd ..
          
          echo "Z2l0Oi8vZ2l0Lm5ldHN1cmYtYnJvd3Nlci5vcmcvbnNnZW5iaW5kLmdpdA==" | base64 -d | xargs git clone
          cd nsgenbind && make PREFIX=$PREFIX NSSHARE=$NSSHARE HOST=x86_64-linux-gnu CC=gcc install && cd ..
          export PATH=$PREFIX/bin:$PATH

          # 3. LibPNG (Required for Freetype and NetSurf)
          wget https://download.sourceforge.net
          tar -xf libpng-1.6.40.tar.gz && cd libpng-1.6.40
          ./configure --host=$HOST --prefix=$PREFIX --disable-shared
          make install && cd ..

          # 4. Freetype (Crucial for E-Ink fonts)
          wget https://download.savannah.gnu.org
          tar -xf freetype-2.13.2.tar.gz && cd freetype-2.13.2
          ./configure --host=$HOST --prefix=$PREFIX --disable-shared --with-png=yes --with-zlib=yes
          make install && cd ..

          # 5. Mandatory NetSurf Libraries
          LIBS_B64="Z2l0Oi8vZ2l0Lm5ldHN1cmYtYnJvd3Nlci5vcmcvbGlibnN1dGlscy5naXQ=
          Z2l0Oi8vZ2l0Lm5ldHN1cmYtYnJvd3Nlci5vcmcvbGlidXRmOHByb2MuZ2l0
          Z2l0Oi8vZ2l0Lm5ldHN1cmYtYnJvd3Nlci5vcmcvbGlicGFyc2VydXRpbHMuZ2l0
          Z2l0Oi8vZ2l0Lm5ldHN1cmYtYnJvd3Nlci5vcmcvbGlid2FwY2FwbGV0LmdpdA==
          Z2l0Oi8vZ2l0Lm5ldHN1cmYtYnJvd3Nlci5vcmcvbGliaHViYnViLmdpdA==
          Z2l0Oi8vZ2l0Lm5ldHN1cmYtYnJvd3Nlci5vcmcvbGliY3NzLmdpdA==
          Z2l0Oi8vZ2l0Lm5ldHN1cmYtYnJvd3Nlci5vcmcvbGliZG9tLmdpdA==
          Z2l0Oi8vZ2l0Lm5ldHN1cmYtYnJvd3Nlci5vcmcvbGlibnNibXAuZ2l0
          Z2l0Oi8vZ2l0Lm5ldHN1cmYtYnJvd3Nlci5vcmcvbGlibnNnaWYuZ2l0
          Z2l0Oi8vZ2l0Lm5ldHN1cmYtYnJvd3Nlci5vcmcvbGlibnNmYi5naXQ="

          for url_b64 in $LIBS_B64; do
            URL=$(echo $url_b64 | base64 -d)
            DIR=$(basename $URL .git)
            git clone $URL && cd $DIR
            make HOST=$HOST PREFIX=$PREFIX NSSHARE=$NSSHARE install && cd ..
          done

          # 6. NetSurf Browser with Kindle/E-Ink Optimizations
          echo "Z2l0Oi8vZ2l0Lm5ldHN1cmYtYnJvd3Nlci5vcmcvbmV0c3VyZi5naXQ=" | base64 -d | xargs git clone
          cd netsurf
          
          cat <<EOF > Makefile.config
          # Disable heavy features
          override NETSURF_USE_RSVG := NO
          override NETSURF_USE_NSSVG := NO
          override NETSURF_USE_VIDEO := NO
          
          # Force Freetype for clean E-Ink text
          override NETSURF_FB_FONTLIB := freetype
          override NETSURF_USE_FREETYPE := YES
          
          # Optimization for E-Ink (Greyscale/FB)
          override NETSURF_FB_BPP := 8
          EOF

          make TARGET=framebuffer HOST=$HOST PREFIX=$PREFIX NSSHARE=$NSSHARE \
               BUILD_CC=gcc XCFLAGS="-DXML_GE=1" install
          
          # Strip symbols to save space on Kindle
          ${HOST}-strip $PREFIX/bin/netsurf

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: netsurf-kindle-k3
          path: ${{ github.workspace }}/kindle-root/
