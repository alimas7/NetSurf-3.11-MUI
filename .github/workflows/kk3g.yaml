name: Build NetSurf for Kindle K3
on: workflow_dispatch

jobs:
  build-kindle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bison flex libcurl4-openssl-dev \
            libpng-dev libjpeg-dev libssl-dev pkg-config gperf rsync wget \
            help2man gawk texinfo libncurses-dev libtool libtool-bin \
            autoconf automake gettext ncurses-dev

      - name: Download Pre-built Kindle Toolchain
        run: |
          # Downloading a pre-compiled ARMv6 toolchain saves ~2 hours of build time
          wget https://github.com
          tar xf x-tools-arm-kindle-linux-gnueabi.tar.xz -C $HOME
          echo "KINDLE_TC_PATH=$HOME/x-tools/arm-kindle-linux-gnueabi" >> $GITHUB_ENV
          echo "$HOME/x-tools/arm-kindle-linux-gnueabi/bin" >> $GITHUB_PATH

      - name: Build NetSurf Stack
        run: |
          export HOST=arm-kindle-linux-gnueabi
          export CC=${HOST}-gcc
          export PREFIX=$GITHUB_WORKSPACE/kindle-root
          
          # You MUST build the libraries in order. 
          # NetSurf's 'env.sh' or specialized build scripts are needed here.
          # For a fork like MUI, ensure you are force-setting the TARGET:
          make TARGET=framebuffer HOST=$HOST PREFIX=$PREFIX install
