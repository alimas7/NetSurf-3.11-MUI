name: Build NetSurf and Permanentize Toolchain
on: [push, workflow_dispatch]

jobs:
  build-and-release:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    env:
      HOST: arm-kindle-linux-gnueabi
      TOOLCHAIN_BIN: /home/runner/x-tools/arm-kindle-linux-gnueabi/bin
    steps:
      - name: Install System Deps
        run: |
          sudo apt-get update
          sudo apt-get install -y gperf bison flex texinfo help2man make libncurses5-dev \
          python3-dev autoconf automake libtool-bin g++ gawk xz-utils wget curl

      - name: Restore Toolchain Cache
        id: cache-toolchain
        uses: actions/cache@v4
        with:
          path: ~/x-tools
          key: ${{ runner.os }}-kindle-k3-toolchain-v6

      # --- TOOLCHAIN BUILD (RE-ADDED FOR FUTURE-PROOFING) ---
      - name: Build Toolchain from Scratch (If Cache Miss)
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          CT_REPO=$(echo "aHR0cHM6Ly9naXRodWIuY29tL2Nyb3NzdG9vbC1uZy9jcm9zc3Rvb2wtbmcuZ2l0" | base64 -d)
          git clone --depth 1 "$CT_REPO"
          cd crosstool-ng
          ./bootstrap && ./configure --enable-local && make
          
          # Initialize for Kindle K3 architecture
          ./ct-ng arm-unknown-linux-gnueabi
          cat >> .config <<EOF
          CT_ARCH_ARCH="armv6"
          CT_ARCH_CPU="arm1136jf-s"
          CT_ARCH_FLOAT_SW=y
          CT_LIBC_GLIBC_V_2_5=y
          CT_KERNEL_V_2_6_26=y
          CT_EXPERIMENTAL=y
          CT_ALLOW_OBSOLETE=y
          EOF
          ./ct-ng oldconfig
          ./ct-ng build

      # --- PERMANENT STORAGE & CHECKSUM ---
      - name: Archive and Checksum Toolchain
        run: |
          tar -cJf kindle-k3-toolchain.tar.xz -C /home/runner x-tools/
          sha256sum kindle-k3-toolchain.tar.xz > kindle-k3-toolchain.tar.xz.sha256

      - name: Create Permanent Release Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: toolchain-v1
          files: |
            kindle-k3-toolchain.tar.xz
            kindle-k3-toolchain.tar.xz.sha256
          body: "Permanent ARMv6 glibc 2.5 toolchain for Kindle K3."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # --- NETSURF BUILD STEP ---
      - name: Setup NetSurf Workspace
        run: |
          mkdir -p ~/ns-workspace
          cd ~/ns-workspace
          NS_REPO=$(echo "aHR0cHM6Ly9naXRodWIuY29tL25ldHN1cmYtYnJvd3Nlci9uZXRzdXJmLmdpdA==" | base64 -d)
          git clone --depth 1 "$NS_REPO"
          cp netsurf/utils/ns-setup .
          chmod +x ns-setup
          ./ns-setup
          
      - name: Fetch and Build Libraries
        run: |
          export PATH=$TOOLCHAIN_BIN:$PATH
          cd ~/ns-workspace
          source env.sh
          ns-clone
          ns-pull-install
          
      - name: Build and Strip Framebuffer Binary
        run: |
          export PATH=$TOOLCHAIN_BIN:$PATH
          cd ~/ns-workspace/netsurf
          make TARGET=framebuffer
          $TOOLCHAIN_BIN/arm-kindle-linux-gnueabi-strip nsfb

      - name: Bundle Extension
        run: |
          mkdir -p dist/extensions/netsurf/bin/fonts
          mkdir -p dist/extensions/netsurf/bin/libs
          mkdir -p dist/extensions/netsurf/bin/.netsurf
          
          FONT_URL=$(echo "aHR0cHM6Ly9naXRodWIuY29tL3NoYW50aWdpbGJlcnQvbGliZXJhdGlvbi1mb250cy10dGYvcmF3L21hc3Rlci9MaWJlcmF0aW9uU2Fucy1SZWd1bGFyLnR0Zg==" | base64 -d)
          wget -O dist/extensions/netsurf/bin/fonts/Sans.ttf "$FONT_URL"
          
          cat > dist/extensions/netsurf/menu.json <<'EOF'
          { "items": [ { "name": "NetSurf", "priority": 0, "action": "bin/launch.sh" } ] }
          EOF
          
          cat > dist/extensions/netsurf/bin/.netsurf/Choices <<'EOF'
          homepage_url:https://www.google.com
          enable_javascript:0
          font_sans:fonts/Sans.ttf
          font_size:12
          EOF

      - name: Create Launch Script
        run: |
          cat > dist/extensions/netsurf/bin/launch.sh <<'EOF'
          #!/bin/sh
          mount -o remount,exec /mnt/us
          cd "$(dirname "$0")"
          export LD_LIBRARY_PATH=$(pwd)/libs:$LD_LIBRARY_PATH
          SWAP_FILE="/mnt/us/netsurf.swap"
          if [ ! -f "$SWAP_FILE" ]; then dd if=/dev/zero of="$SWAP_FILE" bs=1M count=128 && mkswap "$SWAP_FILE"; fi
          swapon "$SWAP_FILE"
          /usr/sbin/eips -c
          /etc/init.d/framework stop
          ./nsfb -b 8 -c ./.netsurf
          swapoff "$SWAP_FILE"
          /etc/init.d/framework start
          EOF
          chmod +x dist/extensions/netsurf/bin/launch.sh

      - name: Package Final Extension
        run: |
          cp ~/ns-workspace/netsurf/nsfb dist/extensions/netsurf/bin/
          cp -r ~/ns-workspace/inst/lib/*.so* dist/extensions/netsurf/bin/libs/ || true
          tar -czvf netsurf-k3-kual-ready.tar.gz -C dist extensions/

      - name: Upload Browser Artifact
        uses: actions/upload-artifact@v4
        with:
          name: netsurf-kindle-k3
          path: /home/runner/work/
          # path: netsurf-k3-extension.tar.gz
          # path: netsurf-k3-kual-ready.tar.gz
