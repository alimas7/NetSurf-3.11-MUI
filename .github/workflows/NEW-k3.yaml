name: Build Hardened NetSurf for Kindle K3
on: [push, workflow_dispatch]

jobs:
  build-and-release:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    env:
      PREFIX: /home/runner/ns-workspace/inst
      TOOLCHAIN_PREFIX: arm-kindle-linux-gnueabi
      # Standardize paths for the NetSurf build system
      PKG_CONFIG_PATH: /home/runner/ns-workspace/inst/lib/pkgconfig
      LD_LIBRARY_PATH: /home/runner/ns-workspace/inst/lib

    steps:
      - name: Install System Deps
        run: |
          sudo apt-get update
          sudo apt-get install -y gperf bison flex texinfo help2man python3-dev autoconf automake libtool-bin g++ gawk xz-utils libhtml-parser-perl

      - name: Restore Toolchain
        run: |
          BASE_URL=$(echo "aHR0cHM6Ly9naXRodWIuY29tLw==" | base64 -d)
          curl -L "${BASE_URL}/${{ github.repository }}/releases/download/toolchain-v9/kindle-k3-toolchain.tar.xz" -o toolchain.tar.xz
          mkdir -p ~/x-tools
          tar -xJf toolchain.tar.xz -C /home/runner/
          
          REAL_BIN=$(find /home/runner/x-tools -name "${{ env.TOOLCHAIN_PREFIX }}-gcc" | xargs dirname)
          echo "TOOLCHAIN_BIN=$REAL_BIN" >> $GITHUB_ENV
          echo "$REAL_BIN" >> $GITHUB_PATH
          SYS_LIB=$(find /home/runner/x-tools -name "libatomic.a" | xargs dirname)
          echo "SYSROOT_LIB=$SYS_LIB" >> $GITHUB_ENV

      - name: Fetch Sources (OpenSSL, Curl, NetSurf)
        run: |
          mkdir -p ~/ns-workspace && cd ~/ns-workspace
          # Fix OpenSSL clone syntax
          git clone --depth 1 -b openssl-3.0 https://github.com openssl
          git clone --depth 1 https://github.com curl
          
          # NetSurf Core Components
          git clone git://git.netsurf-browser.org/buildsystem.git
          for repo in libparserutils libwapcaplet libhubbub libdom libcss libnsbmp libnsgif libnsutils netsurf; do
            git clone git://git.netsurf-browser.org/$repo.git
          done

      - name: Build OpenSSL & Curl
        run: |
          cd ~/ns-workspace/openssl
          ./Configure linux-armv4 --prefix=$PREFIX --openssldir=$PREFIX
          make -j$(nproc) CC=$TOOLCHAIN_BIN/${{ env.TOOLCHAIN_PREFIX }}-gcc AR=$TOOLCHAIN_BIN/${{ env.TOOLCHAIN_PREFIX }}-ar RANLIB=$TOOLCHAIN_BIN/${{ env.TOOLCHAIN_PREFIX }}-ranlib
          make install_sw

          cd ../curl
          autoreconf -fi
          ./configure --host=${{ env.TOOLCHAIN_PREFIX }} --prefix=$PREFIX \
            --with-openssl=$PREFIX --disable-shared --enable-static \
            CC=$TOOLCHAIN_BIN/${{ env.TOOLCHAIN_PREFIX }}-gcc \
            LDFLAGS="-L$PREFIX/lib -L$SYSROOT_LIB" \
            LIBS="-latomic -lpthread"
          make -j$(nproc)
          make install

      - name: Build NetSurf Stack
        run: |
          export NSSHARED=$PREFIX/share/netsurf-buildsystem
          mkdir -p $PREFIX/bin
          
          cd ~/ns-workspace/buildsystem
          make install PREFIX=$PREFIX
          
          for lib in libparserutils libwapcaplet libhubbub libdom libcss libnsbmp libnsgif libnsutils; do
            cd ~/ns-workspace/$lib
            make install PREFIX=$PREFIX NSSHARED=$NSSHARED TARGET=framebuffer \
              COMPONENT_TYPE=lib-static CC=$TOOLCHAIN_BIN/${{ env.TOOLCHAIN_PREFIX }}-gcc
          done
          
          cd ~/ns-workspace/netsurf
          # Final Link requires explicit atomic and ssl paths
          make TARGET=framebuffer PREFIX=$PREFIX NSSHARED=$NSSHARED \
            CC=$TOOLCHAIN_BIN/${{ env.TOOLCHAIN_PREFIX }}-gcc \
            LDFLAGS="-L$PREFIX/lib -L$SYSROOT_LIB -latomic" \
            NETSURF_USE_VIDEO_FROB=NO
          
          cp nsfb $PREFIX/bin/netsurf-bin
          $TOOLCHAIN_BIN/${{ env.TOOLCHAIN_PREFIX }}-strip $PREFIX/bin/netsurf-bin

      - name: Inject Kindle Wrapper
        run: |
          cat << 'EOF' > ${{ env.PREFIX }}/bin/netsurf-k3.sh
          #!/bin/sh
          # Kindle K3 Entry Point
          cd $(dirname "$0")
          if [ ! -f /mnt/us/swapfile ]; then
            dd if=/dev/zero of=/mnt/us/swapfile bs=1M count=128
            mkswap /mnt/us/swapfile
          fi
          swapon /mnt/us/swapfile
          ./netsurf-bin -useragent "Mozilla/5.0 (Kindle/3.0+)" -no-javascript -v
          swapoff /mnt/us/swapfile
          EOF
          chmod +x ${{ env.PREFIX }}/bin/netsurf-k3.sh

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kindle-netsurf-hardened
          path: ${{ env.PREFIX }}/bin/
