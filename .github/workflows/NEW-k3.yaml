name: Build Hardened NetSurf for Kindle K3
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    env:
      PREFIX: /home/runner/ns-workspace/inst
      TOOLCHAIN_PREFIX: arm-kindle-linux-gnueabi
      CACHE_KEY: Linux-kindle-k3-toolchain-v9
      RELEASE_TAG: toolchain-v9
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install System Deps
        run: |
          sudo apt-get update
          sudo apt-get install -y gperf bison flex texinfo help2man make libncurses5-dev \
          python3-dev autoconf automake libtool-bin g++ gawk xz-utils wget curl tree pkg-config \
          libexpat1-dev libpng-dev libjpeg-dev libgif-dev libwebp-dev libfreetype-dev zlib1g-dev

      - name: 1. Try Restore from Cache
        id: cache-toolchain
        uses: actions/cache/restore@v4
        with:
          path: ~/x-tools
          key: ${{ env.CACHE_KEY }}

      - name: 2. Try Download from Release (If Cache Miss)
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        id: download-release
        continue-on-error: true
        run: |
          REL_URL=$(echo "aHR0cHM6Ly9naXRodWIuY29tLw==" | base64 -d)"${{ github.repository }}"$(echo "L3JlbGVhc2VzL2Rvd25sb2FkLw==" | base64 -d)
          curl -L "${REL_URL}/${{ env.RELEASE_TAG }}/kindle-k3-toolchain.tar.xz" -o toolchain.tar.xz
          mkdir -p ~/x-tools
          tar -xJ -f toolchain.tar.xz -C /home/runner/

      - name: 3. Build Toolchain Fallback (If Cache and Release Miss)
        if: steps.cache-toolchain.outputs.cache-hit != 'true' && steps.download-release.outcome != 'success'
        run: |
          CT_REPO=$(echo "aHR0cHM6Ly9naXRodWIuY29tL2Nyb3NzdG9vbC1uZy9jcm9zc3Rvb2wtbmcuZ2l0" | base64 -d)
          git clone --depth 1 "$CT_REPO"
          cd crosstool-ng && ./bootstrap && ./configure --enable-local && make
          cat > kindle_k3_defconfig <<EOF
          CT_EXPERIMENTAL=y
          CT_ALLOW_OBSOLETE=y
          CT_ARCH_ARM=y
          CT_ARCH_ARCH="armv6"
          CT_ARCH_CPU="arm1136jf-s"
          CT_ARCH_FLOAT_SW=y
          CT_TARGET_VENDOR="kindle"
          CT_LIBC_GLIBC=y
          CT_LIBC_GLIBC_V_2_5=y
          CT_KERNEL_LINUX=y
          CT_KERNEL_V_2_6_26=y
          CT_GCC_V_6=y
          CT_LOG_PROGRESS_BAR=n
          EOF
          ./ct-ng defconfig DEFCONFIG=kindle_k3_defconfig && ./ct-ng build

      - name: 4. Ensure Release Exists (Permanent Storage)
        if: steps.cache-toolchain.outputs.cache-hit == 'true' || steps.download-release.outcome != 'success'
        run: |
          if [ ! -f kindle-k3-toolchain.tar.xz ]; then
            tar -cJf kindle-k3-toolchain.tar.xz -C /home/runner x-tools/
          fi
          gh release create ${{ env.RELEASE_TAG }} kindle-k3-toolchain.tar.xz \
          --repo ${{ github.repository }} \
          --title "Kindle Toolchain" --notes "Permanent backup" || \
          gh release upload ${{ env.RELEASE_TAG }} kindle-k3-toolchain.tar.xz \
          --repo ${{ github.repository }} --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 5. Locate Toolchain Paths
        run: |
          REAL_BIN=$(find /home/runner -name "${{ env.TOOLCHAIN_PREFIX }}-gcc" -type f -executable -printf '%h\n' | head -n 1)
          echo "TOOLCHAIN_BIN=$REAL_BIN" >> $GITHUB_ENV
          echo "$REAL_BIN" >> $GITHUB_PATH
          SYS_LIB=$(find /home/runner -name "libatomic.a" -printf '%h\n' | head -n 1)
          echo "SYSROOT_LIB=$SYS_LIB" >> $GITHUB_ENV

      - name: 6. Clone All Repositories
        run: |
          mkdir -p ~/ns-workspace
          cd ~/ns-workspace
          NS_BASE=$(echo "aHR0cHM6Ly9naXRodWIuY29tL25ldHN1cmYtYnJvd3Nlci8=" | base64 -d)
          for r in buildsystem libparserutils libwapcaplet libhubbub libdom libcss libnsbmp libnsgif libnsutils netsurf; do
            git clone --depth 1 "${NS_BASE}${r}.git"
          done
          git clone --depth 1 --branch openssl-3.0 $(echo "aHR0cHM6Ly9naXRodWIuY29tL29wZW5zc2wvb3BlbnNzbC5naXQ=" | base64 -d) openssl
          git clone --depth 1 $(echo "aHR0cHM6Ly9naXRodWIuY29tL2N1cmwvY3VybC5naXQ=" | base64 -d) curl

      - name: 7. Build OpenSSL
        run: |
          cd ~/ns-workspace/openssl
          ./Configure linux-armv4 --prefix=$PREFIX --openssldir=$PREFIX/ssl no-shared \
          CC=$TOOLCHAIN_BIN/${{ env.TOOLCHAIN_PREFIX }}-gcc AR=$TOOLCHAIN_BIN/${{ env.TOOLCHAIN_PREFIX }}-ar \
          RANLIB=$TOOLCHAIN_BIN/${{ env.TOOLCHAIN_PREFIX }}-ranlib LD=$TOOLCHAIN_BIN/${{ env.TOOLCHAIN_PREFIX }}-ld
          make -j$(nproc) || make
          make install_sw

      - name: 8. Build LibCurl
        run: |
          cd ~/ns-workspace/curl
          autoreconf -fi
          export PKG_CONFIG_PATH=$PREFIX/lib/pkgconfig
          ./configure --host=${{ env.TOOLCHAIN_PREFIX }} --prefix=$PREFIX \
          --with-openssl=$PREFIX --disable-shared --enable-static \
          --disable-threaded-resolver --without-libidn2 --without-libpsl \
          CC=$TOOLCHAIN_BIN/${{ env.TOOLCHAIN_PREFIX }}-gcc \
          LDFLAGS="-L$SYSROOT_LIB" LIBS="-latomic"
          make -j$(nproc) && make install

      - name: 9. Build NetSurf Stack
        run: |
          export NSSHARED=$PREFIX/share/netsurf-buildsystem
          mkdir -p $PREFIX/bin
          cd ~/ns-workspace/buildsystem
          make install PREFIX=$PREFIX

          for lib in libparserutils libwapcaplet libhubbub libdom libcss libnsbmp libnsgif libnsutils; do
            cd ~/ns-workspace/$lib
            # Added WITH_ flags to ensure libdom skips expat bindings
            make install PREFIX=$PREFIX NSSHARED=$NSSHARED TARGET=framebuffer \
            COMPONENT_TYPE=lib-static CC=$TOOLCHAIN_BIN/${{ env.TOOLCHAIN_PREFIX }}-gcc
          done

          cd ~/ns-workspace/netsurf
          make TARGET=framebuffer PREFIX=$PREFIX NSSHARED=$NSSHARED \
          CC=$TOOLCHAIN_BIN/${{ env.TOOLCHAIN_PREFIX }}-gcc \
          LDFLAGS="-L$PREFIX/lib -L$SYSROOT_LIB -latomic -lexpat -lpng -ljpeg -lz -lfreetype -lm" \
          NETSURF_USE_VIDEO_FROB=NO

          cp nsfb $PREFIX/bin/netsurf-bin
          $TOOLCHAIN_BIN/${{ env.TOOLCHAIN_PREFIX }}-strip $PREFIX/bin/netsurf-bin

      - name: 10. Final Verification
        run: |
          echo "--- Binary Architecture ---"
          $TOOLCHAIN_BIN/${{ env.TOOLCHAIN_PREFIX }}-readelf -h $PREFIX/bin/netsurf-bin | grep 'Machine'
          echo "--- Dynamic Dependencies (Should be minimal/static) ---"
          $TOOLCHAIN_BIN/${{ env.TOOLCHAIN_PREFIX }}-readelf -d $PREFIX/bin/netsurf-bin | grep 'NEEDED' || echo "Fully Static"

      - name: 11. Inject Kindle Wrapper
        run: |
          cat << 'EOF' > ${{ env.PREFIX }}/bin/netsurf-k3.sh
          #!/bin/sh
          cd $(dirname "$0")
          if [ ! -f /mnt/us/swapfile ]; then
            dd if=/dev/zero of=/mnt/us/swapfile bs=1M count=128
            mkswap /mnt/us/swapfile
          fi
          swapon /mnt/us/swapfile
          ./netsurf-bin -useragent "Mozilla/5.0 (Kindle/3.0+)" -no-javascript -v
          swapoff /mnt/us/swapfile
          EOF
          chmod +x ${{ env.PREFIX }}/bin/netsurf-k3.sh

      - name: 12. Tar Runner Workspace
        if: always()
        run: |
          find / -type f 2>&1 | xz -9c > files.lst.xz
          tar -czf runner-workspace.tar.gz --exclude=runner-workspace.tar.gz /home/runner

      - name: 13. Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: files.lst.xz
          path: files.lst.xz

      - name: 14. Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kindle-netsurf-hardened
          path: runner-workspace.tar.gz
